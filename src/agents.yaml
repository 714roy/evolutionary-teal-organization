# ETO Agent 池配置
# 每个 Agent 只有 specialty（专长），没有固定角色
agents:
  researcher:
    specialty: "信息调研、数据分析、文献检索、行业分析、报告撰写"
    model: "ollama/qwen3.5:9b"
    tools: ["read", "bash"]
    max_concurrency: 3

  coder:
    specialty: "代码编写、重构、调试、架构设计、技术方案"
    model: "ollama/qwen2.5-coder:7b"
    tools: ["read", "write", "bash", "edit"]
    max_concurrency: 2

  auditor:
    specialty: "质量审查、安全检查、格式校验、代码审计、合规检查"
    model: "ollama/gemma3:27b"
    tools: ["read"]
    max_concurrency: 5
